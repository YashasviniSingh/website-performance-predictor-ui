<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Performance Predictor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="bg"></div>

<div class="container">
  <div class="card">

    <h1>🚀 Website Performance Predictor</h1>

    <form action="/predict" method="post">
      <input 
        type="url" 
        name="url" 
        placeholder="Enter website URL..."
        value="{{ url_value }}"
        required
      >

      <button type="submit">Analyze</button>
    </form>

    {% if prediction is not none %}
    <div class="result">
      <h2>Performance Score</h2>

      <div class="progress">
        <div class="progress-bar" 
             style="width: {{ gauge_width }}%; background: {{ color }};">
        </div>
      </div>

      <p class="score">{{ prediction }}%</p>
    </div>
    {% endif %}

  </div>
</div>

</body>
</html>
